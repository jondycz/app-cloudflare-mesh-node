---
name: Cloudflare WARP Mesh Node
version: dev
slug: cloudflare_warp_mesh
description: Cloudflare WARP connector for mesh networking with Zero Trust (Home Assistant App)
url: https://github.com/jondycz/app-cloudflare-mesh-node
ingress: true
ingress_port: 0
ingress_stream: true
startup: services
panel_icon: mdi:cloud-lock
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
host_network: true
host_dbus: true
privileged:
  - NET_ADMIN
  - NET_RAW
  - SYS_ADMIN
devices:
  - /dev/net/tun
map:
  - type: share
    read_only: false
options:
  connector_token: ""
  accept_routes: true
  advertise_routes:
    - local_subnets
  snat_subnet_routes: true
  log_level: info
  override_virtual_networks: []
schema:
  connector_token: str  # Cloudflare WARP Zero Trust connector token
  accept_routes: bool   # Accept routes from other Cloudflare WARP mesh apps
  advertise_routes:
    - "match(^(?:local_subnets|(?:(?:25[0-5]|(?:2[0-4]|1\\d|[1-9]?)\\d)\\.){3}(?:25[0-5]|(?:2[0-4]|1\\d|[1-9]?)\\d)\\/(?:3[0-2]|[12]?\\d)|[a-fA-F\\d.:]+:[a-fA-F\\d.:]+\\/(?:12[0-8]|(?:1[01]|[1-9]?)\\d))$)"  # Subnets or local_subnets to advertise
  snat_subnet_routes: bool
  log_level: info
  override_virtual_networks:
    type: list
    items:
      type: str
