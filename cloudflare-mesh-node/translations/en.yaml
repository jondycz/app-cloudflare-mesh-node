---
configuration:
  accept_dns:
    name: Accept DNS
    description: >-
      This option allows you to accept DNS settings of your Cloudflare Zero Trust network that are
      configured on the DNS page of the Cloudflare dashboard.
      This option is enabled by default.
  accept_routes:
    name: Accept routes
    description: >-
      This option allows you to accept subnet routes advertised by other nodes
      in your Cloudflare WARP mesh network.
      This option is enabled by default.
  advertise_exit_node:
    name: Advertise as an exit node
    description: >-
      This option allows you to advertise this node as an exit node.
      By setting a device on your network as an exit node, you can use it to
      route all your public internet traffic as needed, like a consumer VPN.
        "Restart of the app is required after the issue is fixed!"
  advertise_connector:
    name: Advertise as an app connector
    description: >-
      When you use an app connector, you specify which applications you wish to make
      accessible over your Cloudflare Zero Trust network, and the domains for those applications. Any traffic
      for that application is then forced over the mesh to a node running an app
      connector before egressing to the target domains.
      This option is enabled by default.
  advertise_routes:
    name: Advertise subnet routes
    description: >-
      This option allows you to advertise routes to subnets (accessible on the network
      your device is connected to) to other clients on your Cloudflare WARP mesh network.
      The app by default will advertise routes to your subnets on all supported
      interfaces by adding `local_subnets` to the list.
  always_use_derp:
    name: Always use relay connection
    description: >-
      When enabled, forces all peer communication over relay by disabling the use of
      UDP direct connections.
      This option is disabled by default.
  exit_node:
    name: Use exit node
    description: >-
      This option allows you to specify another Cloudflare WARP mesh node as an exit node for
      this device.
      By setting a device on your network as an exit node, you can use it to
      route all your public internet traffic as needed, like a consumer VPN.
      This option is unused by default.
  log_level:
    name: Log level
    description: >-
      Controls the level of log details the app provides.
      This only applies to the app itself, not Cloudflare WARP.
  login_server:
    name: Login server
    description: >-
      This option allows you to specify a custom control server for this
      Cloudflare WARP instance, for example, a custom Cloudflare Zero Trust endpoint.
      By default, it uses the control server provided by Cloudflare.
  share_homeassistant:
    name: Share Home Assistant with Cloudflare Tunnel
    description: >-
      This option allows you to enable Cloudflare Tunnel or similar features to present
      your Home Assistant instance with a valid certificate on your Zero Trust network or on the
      internet.
      This option is disabled by default.
  share_on_port:
    name: Share on port
    description: >-
      This option lets you specify which port Cloudflare Tunnel or similar features
      will use to present your Home Assistant instance on the Zero Trust network and on the
      internet.
      Only ports 443, 8443, and 10000 are allowed by Cloudflare.
      Port 443 is used by default.
  snat_subnet_routes:
    name: Source NAT subnet routes
    description: >-
      This option allows subnet devices to see the traffic originating from the
      subnet router, and this simplifies routing configuration.
      To support advanced site-to-site networking (eg. to traverse multiple
      networks), you can disable this functionality.
      This option is enabled by default.
  stateful_filtering:
    name: Stateful packet filtering
    description: >-
      This option enables stateful packet filtering on packet-forwarding nodes (exit
      nodes, subnet routers, and app connectors), to only allow return packets for
      existing outbound connections.
      This option is disabled by default.
  tags:
    name: Tags
    description: >-
      This option allows you to specify specific ACL tags for this
      Cloudflare WARP mesh node. They need to start with `tag:`.
  taildrive:
    name: Taildrive shares
    description: >-
      This option allows you to specify which Home Assistant directories you want to
      share with other Cloudflare WARP mesh nodes using a drive sharing feature.
      Only the listed directories are available.
      These options are disabled by default.
  taildrop:
    name: File drop
    description: >-
      This option allows you to enable file drop, a file sharing service
      that allows you to share files with other Cloudflare WARP mesh nodes.
      This option is enabled by default.
  userspace_networking:
    name: Userspace networking mode
    description: >-
      This option allows you to enable userspace networking mode.
      If you need to access other clients on your Cloudflare WARP mesh from your Home
      Assistant instance, disable userspace networking mode, which will create a
      `CloudflareWARP` network interface on your host.
      This option is enabled by default.
network:
  41641/udp: >-
    UDP port to listen on for Cloudflare WARP peer-to-peer traffic.
    When not set, an automatically selected port is used by default.
